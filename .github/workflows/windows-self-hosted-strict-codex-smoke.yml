name: windows-self-hosted-strict-codex-smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on:
      - self-hosted
      - windows
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
    env:
      CONTROL_PLANE_BASE_URL: http://127.0.0.1:8788
      CONTROL_PLANE_TOKEN: ci-token
      WORKER_ID: ci-worker-win-strict
      WORKER_DISPLAY_NAME: CI Windows Worker Strict
      WORKER_CAPABILITIES: os:windows,tool:codex,tool:git
      WORKER_MAX_CONCURRENCY: '1'
      WORKER_DEFAULT_PROVIDER: codex
      WORKER_EXECUTION_MODE: strict
      WORKER_CODEX_SANDBOX: workspace-write
      WORKER_POLL_INTERVAL_MS: '1000'
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      WORKER_CODEX_MODEL: ${{ vars.WORKER_CODEX_MODEL }}
      WORKER_CODEX_BIN_HINT: ${{ vars.WORKER_CODEX_BIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Resolve Codex CLI
        run: |
          $candidates = New-Object System.Collections.Generic.List[string]

          if ($env:WORKER_CODEX_BIN_HINT) {
            $candidates.Add($env:WORKER_CODEX_BIN_HINT)
          }

          $command = Get-Command codex -ErrorAction SilentlyContinue
          if ($command -and $command.Source) {
            $candidates.Add($command.Source)
          }

          if ($env:USERPROFILE) {
            $candidates.Add((Join-Path $env:USERPROFILE 'AppData\Roaming\npm\codex.cmd'))
          }

          if ($env:LOCALAPPDATA) {
            $candidates.Add((Join-Path $env:LOCALAPPDATA 'npm\codex.cmd'))
          }

          Get-ChildItem -Path 'C:\Users' -Directory -ErrorAction SilentlyContinue | ForEach-Object {
            $candidates.Add((Join-Path $_.FullName 'AppData\Roaming\npm\codex.cmd'))
            $candidates.Add((Join-Path $_.FullName '.local\bin\codex.cmd'))
            $candidates.Add((Join-Path $_.FullName '.local\bin\codex.exe'))
          }

          $resolved = $candidates |
            Where-Object { $_ -and (Test-Path -LiteralPath $_) } |
            Select-Object -First 1

          if (-not $resolved) {
            Write-Host "whoami: $(whoami)"
            Write-Host "USERPROFILE: $env:USERPROFILE"
            Write-Host "LOCALAPPDATA: $env:LOCALAPPDATA"
            Write-Host "PATH: $env:PATH"
            throw "Codex CLI not found for the runner service account. Set repo variable WORKER_CODEX_BIN to the full codex path or make codex available on PATH."
          }

          Write-Host "Resolved Codex CLI: $resolved"
          "WORKER_CODEX_BIN=$($resolved -replace '\\','/')" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Verify Codex CLI
        run: |
          & $env:WORKER_CODEX_BIN --version
          & $env:WORKER_CODEX_BIN exec --help | Select-String "skip-git"

      - name: Prepare local git repo for strict smoke job
        run: |
          $repoDir = Join-Path $env:RUNNER_TEMP 'worker-agent-strict-smoke-repo'
          if (Test-Path $repoDir) {
            Remove-Item -LiteralPath $repoDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $repoDir | Out-Null
          git -C $repoDir init -q --initial-branch=main
          git -C $repoDir config user.name "CI Smoke"
          git -C $repoDir config user.email "ci-smoke@example.test"
          @"
          # Worker Agent Strict Smoke Repo

          Initial content for strict CI smoke.
          "@ | Set-Content -LiteralPath (Join-Path $repoDir 'README.md')
          git -C $repoDir add README.md
          git -C $repoDir commit -qm "init strict smoke repo"
          $baseCommit = git -C $repoDir rev-parse HEAD
          "MOCK_JOB_REPO_URL=$($repoDir -replace '\\','/')" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "MOCK_JOB_BASE_COMMIT=$baseCommit" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "WORKER_WORKSPACE_ROOT=$($env:RUNNER_TEMP -replace '\\','/')/.workspaces" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "WORKER_SESSION_STORE=$($env:RUNNER_TEMP -replace '\\','/')/.sessions/store.json" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run strict end-to-end smoke
        run: |
          $env:MOCK_CONTROL_PLANE_PORT = '8788'
          $env:MOCK_CONTROL_PLANE_TOKEN = $env:CONTROL_PLANE_TOKEN
          $env:MOCK_JOB_ID = 'job-ci-strict-smoke-1'
          $env:MOCK_JOB_REPO_URL = $env:MOCK_JOB_REPO_URL
          $env:MOCK_JOB_BASE_COMMIT = $env:MOCK_JOB_BASE_COMMIT
          $env:MOCK_JOB_REQUIREMENTS = "tool:codex,tool:git,os:windows"
          $env:MOCK_JOB_TARGET_FILES = "README.md"
          $env:MOCK_JOB_PROMPT = "Open README.md, append a single new line that says `CI strict smoke executed.` and then stop. Keep all other content unchanged."
          $env:MOCK_STATE_FILE = Join-Path $env:RUNNER_TEMP 'mock-control-plane-state.json'
          $stdoutPath = Join-Path $env:RUNNER_TEMP 'mock-control-plane.stdout.log'
          $stderrPath = Join-Path $env:RUNNER_TEMP 'mock-control-plane.stderr.log'
          $workerLogPath = Join-Path $env:RUNNER_TEMP 'worker-start-once.log'

          $process = $null
          try {
            $process = Start-Process node -ArgumentList 'scripts/mock-control-plane.mjs' -WorkingDirectory $PWD -PassThru -NoNewWindow -RedirectStandardOutput $stdoutPath -RedirectStandardError $stderrPath
            Start-Sleep -Seconds 2
            Invoke-RestMethod -Uri 'http://127.0.0.1:8788/__state' | Out-Null

            $output = npm run start:once 2>&1
            $outputText = ($output | Out-String)
            $outputText | Tee-Object -FilePath $workerLogPath
            if ($LASTEXITCODE -ne 0) {
              throw "start:once failed with exit code $LASTEXITCODE"
            }
            if ($outputText -notmatch 'completed job=job-ci-strict-smoke-1') {
              throw "Expected strict completed output, got: $outputText"
            }

            $state = Invoke-RestMethod -Uri 'http://127.0.0.1:8788/__state'
            if ($state.job.status -ne 'completed') {
              throw "Expected completed job status, got $($state.job.status)"
            }

            $patchArtifact = $state.artifacts | Where-Object { $_.kind -eq 'patch' } | Select-Object -First 1
            if (-not $patchArtifact) {
              throw "Expected a patch artifact from strict codex smoke"
            }

            $patchText = [System.Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($patchArtifact.content_base64))
            if ($patchText -notmatch 'CI strict smoke executed\.') {
              throw "Expected patch to contain the strict smoke marker"
            }
          }
          finally {
            if ($process) {
              Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Upload strict smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-self-hosted-strict-codex-smoke-logs
          path: |
            ${{ runner.temp }}/mock-control-plane.stdout.log
            ${{ runner.temp }}/mock-control-plane.stderr.log
            ${{ runner.temp }}/mock-control-plane-state.json
            ${{ runner.temp }}/worker-start-once.log
